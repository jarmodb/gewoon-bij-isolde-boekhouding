<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Achtergrond: blush roze -->
  <rect width="512" height="512" rx="100" fill="#f5e1db"/>

  <!-- Kwast-veeg achtergrond (zoals het logo) -->
  <ellipse cx="256" cy="270" rx="238" ry="118" fill="#e8b5a8" opacity="0.55"/>
  <ellipse cx="260" cy="258" rx="225" ry="100" fill="#dfa090" opacity="0.30"/>

  <!-- Grote G — hoofdletter van het merk -->
  <text
    x="256" y="358"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="295"
    font-weight="400"
    fill="#1a1212"
    letter-spacing="-8"
  >G</text>

  <!-- Subtiele "bij isolde" tekst onderaan -->
  <text
    x="256" y="415"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="400"
    fill="#1a1212"
    letter-spacing="8"
    opacity="0.65"
  >bij isolde</text>
</svg>
