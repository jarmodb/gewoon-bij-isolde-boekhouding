[build]
  command = "npm ci --cache .npm && npm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- src/ index.html package.json vite.config.js netlify.toml"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false
